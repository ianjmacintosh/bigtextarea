<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Text Area</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 5px;
        font-family: monospace;

        min-height: 100dvh;
        min-width: 100dvw;
        display: grid;
        grid-auto-flow: row;
        grid-template-rows: 1fr auto;
        gap: 10px;
      }

      form[role="main"] {
        align-items: center;
        display: grid;
        grid-template-areas:
          "label controls"
          "textarea textarea";
        grid-template-columns: 1fr auto;
        grid-template-rows: auto 1fr;
        gap: 5px;
      }

      form[role="main"] label {
        grid-area: label;
      }

      form[role="main"] button {
        grid-area: controls;
      }

      .textarea {
        grid-area: textarea;
        height: 100%;
        width: 100%;
        border: solid 1px black;
        font-family: monospace;
        font-size: 16px;
        padding: 5px;
      }

      .textarea:focus {
        outline: solid 2px dodgerblue;
        outline-offset: 1px;
      }

      button {
        display: flex;
        flex-direction: row;
        font-family: monospace;
        align-items: center;
        gap: 5px;
        background-color: oklch(0.97 0 0);
        border: none;
        padding: 5px 10px;
        border-radius: 10px;
      }

      button svg {
        fill: #000;
      }

      #settings {
        text-align: left;
      }

      @keyframes bubble-in {
        0% {
          transform: scale(90%);
        }

        100% {
          transform: scale(100%);
        }
      }

      @keyframes fade-in {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .modal-visible {
        filter: blur(4px);
      }

      #settings {
        border: none;
        animation:
          fade-in 180ms ease-out,
          bubble-in 180ms ease-out;
      }

      #settings::backdrop {
        background-color: rgba(20, 20, 20, 0.2);
        animation: fade-in 180ms;
      }

      #settings ul {
        list-style: none;
        padding-left: 0;
      }

      #settings input {
        min-height: 24px;
        min-width: 24px;
      }

      #settings label {
        gap: 5px;
        display: flex;
        flex-direction: row;
        align-items: center;
      }

      #settings input:focus,
      #settings label:hover input[type="checkbox"] {
        outline: solid 2px dodgerblue;
        outline-offset: 1px;
      }

      .hidden,
      #settings.hidden {
        display: none;
      }

      footer {
        display: grid;
        grid-auto-columns: auto 1fr;
        grid-auto-flow: column;
      }

      #credits {
        text-align: right;
      }

      #settings header {
        display: grid;
        grid-auto-flow: column;
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      #settings header h1 {
        padding: 0;
        margin: 0;
      }

      #settings header button {
        border: none;
        background: transparent;
      }

      #settings header button:hover {
        background: lightgoldenrodyellow;
      }
    </style>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://unpkg.com/tiny-markdown-editor/dist/tiny-mde.min.css"
    />
  </head>
  <body>
    <form action="/" id="form" role="main">
      <label for="textarea">Enter text below</label>
      <textarea
        id="textarea"
        name="textarea"
        class="textarea"
        cols="80"
        rows="10"
        role="main"
        aria-label="Content"
        autofocus
      ></textarea>
      <button type="button" id="settings-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="#000000"
          viewBox="0 0 256 256"
        >
          <path
            d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Zm88-29.84q.06-2.16,0-4.32l14.92-18.64a8,8,0,0,0,1.48-7.06,107.21,107.21,0,0,0-10.88-26.25,8,8,0,0,0-6-3.93l-23.72-2.64q-1.48-1.56-3-3L186,40.54a8,8,0,0,0-3.94-6,107.71,107.71,0,0,0-26.25-10.87,8,8,0,0,0-7.06,1.49L130.16,40Q128,40,125.84,40L107.2,25.11a8,8,0,0,0-7.06-1.48A107.6,107.6,0,0,0,73.89,34.51a8,8,0,0,0-3.93,6L67.32,64.27q-1.56,1.49-3,3L40.54,70a8,8,0,0,0-6,3.94,107.71,107.71,0,0,0-10.87,26.25,8,8,0,0,0,1.49,7.06L40,125.84Q40,128,40,130.16L25.11,148.8a8,8,0,0,0-1.48,7.06,107.21,107.21,0,0,0,10.88,26.25,8,8,0,0,0,6,3.93l23.72,2.64q1.49,1.56,3,3L70,215.46a8,8,0,0,0,3.94,6,107.71,107.71,0,0,0,26.25,10.87,8,8,0,0,0,7.06-1.49L125.84,216q2.16.06,4.32,0l18.64,14.92a8,8,0,0,0,7.06,1.48,107.21,107.21,0,0,0,26.25-10.88,8,8,0,0,0,3.93-6l2.64-23.72q1.56-1.48,3-3L215.46,186a8,8,0,0,0,6-3.94,107.71,107.71,0,0,0,10.87-26.25,8,8,0,0,0-1.49-7.06Zm-16.1-6.5a73.93,73.93,0,0,1,0,8.68,8,8,0,0,0,1.74,5.48l14.19,17.73a91.57,91.57,0,0,1-6.23,15L187,173.11a8,8,0,0,0-5.1,2.64,74.11,74.11,0,0,1-6.14,6.14,8,8,0,0,0-2.64,5.1l-2.51,22.58a91.32,91.32,0,0,1-15,6.23l-17.74-14.19a8,8,0,0,0-5-1.75h-.48a73.93,73.93,0,0,1-8.68,0,8,8,0,0,0-5.48,1.74L100.45,215.8a91.57,91.57,0,0,1-15-6.23L82.89,187a8,8,0,0,0-2.64-5.1,74.11,74.11,0,0,1-6.14-6.14,8,8,0,0,0-5.1-2.64L46.43,170.6a91.32,91.32,0,0,1-6.23-15l14.19-17.74a8,8,0,0,0,1.74-5.48,73.93,73.93,0,0,1,0-8.68,8,8,0,0,0-1.74-5.48L40.2,100.45a91.57,91.57,0,0,1,6.23-15L69,82.89a8,8,0,0,0,5.1-2.64,74.11,74.11,0,0,1,6.14-6.14A8,8,0,0,0,82.89,69L85.4,46.43a91.32,91.32,0,0,1,15-6.23l17.74,14.19a8,8,0,0,0,5.48,1.74,73.93,73.93,0,0,1,8.68,0,8,8,0,0,0,5.48-1.74L155.55,40.2a91.57,91.57,0,0,1,15,6.23L173.11,69a8,8,0,0,0,2.64,5.1,74.11,74.11,0,0,1,6.14,6.14,8,8,0,0,0,5.1,2.64l22.58,2.51a91.32,91.32,0,0,1,6.23,15l-14.19,17.74A8,8,0,0,0,199.87,123.66Z"
          ></path>
        </svg>
        <span>Settings</span>
      </button>
    </form>
    <dialog aria-labelledby="settings-heading" closedby="any" id="settings">
      <form method="dialog">
        <header>
          <h1 id="settings-heading">Settings</h1>
          <button aria-label='Close "Settings"'>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#000000"
              viewBox="0 0 256 256"
            >
              <path
                d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"
              ></path>
            </svg>
          </button>
        </header>
        <ul>
          <li>
            <label id="format-content-label" for="format-content">
              <input id="format-content" type="checkbox" />
              <span>
                Format content using Markdown (<a
                  href="https://www.markdownguide.org/cheat-sheet/"
                  target="_blank"
                  >cheat sheet</a
                >)</span
              >
            </label>
          </li>
          <li>
            <label id="save-content-label" for="save-content">
              <input id="save-content" type="checkbox" />
              <span>Keep text on reload</span>
            </label>
          </li>
        </ul>
      </form>
      <footer>
        <span id="credits"
          >&copy; 2026
          <a href="https://www.ianjmacintosh.com/" target="_blank"
            >Ian J. MacIntosh</a
          ></span
        >
      </footer>
    </dialog>
    <script src="https://unpkg.com/tiny-markdown-editor/dist/tiny-mde.min.js"></script>

    <script>
      const elements = {
        settings: document.getElementById("settings"),
        textarea: document.getElementById("textarea"),
        settingsButton: document.getElementById("settings-button"),
        markdownCheckbox: document.getElementById("format-content"),
        saveTextCheckbox: document.getElementById("save-content"),
        tinyMDE: null,
      };

      (function initializeApp() {
        if (localStorage) {
          elements.checked = localStorage.getItem("save") === "true";
          elements.markdownCheckbox.checked =
            localStorage.getItem("format") === "true";
          elements.textarea.value = localStorage.getItem("content") ?? "";
        } else {
          elements.saveTextCheckbox.disabled = true;
        }

        if (
          elements.saveTextCheckbox.checked ||
          localStorage.getItem("save") === null ||
          localStorage.getItem("save") === "true"
        ) {
          elements.saveTextCheckbox.checked = true;
          saveContent();
          elements.textarea.addEventListener("input", saveContent);
        }

        if (elements.markdownCheckbox.checked) {
          activateFormatting();
        }

        // Open/close Settings window
        elements.settingsButton.addEventListener("click", toggleSettings);

        // Individual settings
        elements.markdownCheckbox.addEventListener(
          "change",
          updateMarkdownHandling,
        );
        elements.saveTextCheckbox.addEventListener("change", updateSaveText);
      })();

      function toggleSettings() {
        document.body.classList.add("modal-visible");
        elements.settings.addEventListener(
          "close",
          function removeModalVisibleClass() {
            document.body.classList.remove("modal-visible");
          },
        );
        elements.settings.showModal();
      }

      function activateFormatting() {
        tinyMDE = new TinyMDE.Editor({ textarea });
        tinyMDE.e.classList.add("textarea");

        if (elements.saveTextCheckbox.checked) {
          textarea.removeEventListener("input", saveContent);
          tinyMDE.addEventListener("change", saveContent);
        }
      }

      function deactivateFormatting() {
        tinyMDE.e.remove();
        elements.textarea.setAttribute("style", "display: inherit");

        if (elements.saveTextCheckbox.checked) {
          textarea.addEventListener("input", saveContent);
        }
      }

      function updateMarkdownHandling(event) {
        const isMarkdownCheckboxChecked = this.checked;
        localStorage.setItem("format", isMarkdownCheckboxChecked);

        if (isMarkdownCheckboxChecked) {
          if (typeof TinyMDE === "undefined") {
            alert("Text cannot be formatted because the plug-in didn't load!");

            this.checked = false;
            return;
          }
          activateFormatting();
        } else {
          deactivateFormatting();
        }
      }

      function updateSaveText(event) {
        localStorage.setItem("save", String(this.checked));
        if (this.checked) {
          saveContent();
          textarea.addEventListener("input", saveContent);
        } else {
          localStorage.removeItem("content");
          textarea.removeEventListener("input", saveContent);
        }
      }

      function saveContent() {
        localStorage.setItem("content", textarea.value);
      }
    </script>
  </body>
</html>
