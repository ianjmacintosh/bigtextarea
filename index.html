<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Text Area</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
      }
      form {
        height: calc(100vh - 40px);
        width: calc(100vw - 40px);
        display: grid;
        grid-auto-flow: row;
        grid-template-rows: 1fr auto;
      }

      #textarea,
      #tinymde-editor {
        border: solid 1px black;
        font-family: monospace;
      }

      #controls {
        list-style: none;
        padding-left: 0;
      }

      #controls input {
        min-height: 24px;
        min-width: 24px;
      }

      #controls label {
        gap: 5px;
        display: flex;
        flex-direction: row;
        align-items: center;
      }

      footer {
        text-align: right;
      }
    </style>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://unpkg.com/tiny-markdown-editor/dist/tiny-mde.min.css"
    />
  </head>
  <body>
    <form action="#" id="form">
      <textarea
        id="textarea"
        name="textarea"
        cols="80"
        rows="10"
        role="main"
        aria-label="Content"
      ></textarea>
      <ul id="controls">
        <li>
          <label id="format-content-label">
            <input id="format-content" type="checkbox" />
            <span
              >Format content using Markdown (<a
                href="https://www.markdownguide.org/cheat-sheet/"
                target="_blank"
                >cheat sheet</a
              >)</span
            >
          </label>
        </li>
        <li>
          <label id="save-content-label">
            <input id="save-content" type="checkbox" />
            <span>Preserve content locally</span>
          </label>
        </li>
      </ul>
      <footer>&copy; 2026 Ian J. MacIntosh</footer>
    </form>
    <script src="https://unpkg.com/tiny-markdown-editor/dist/tiny-mde.min.js"></script>

    <script>
      const textarea = document.getElementById("textarea");
      const markdownCheckbox = document.getElementById("format-content");
      const saveTextCheckbox = document.getElementById("save-content");
      let tinyMDE;

      (function initializeApp() {
        if (localStorage) {
          saveTextCheckbox.checked = localStorage.getItem("save") === "true";
          markdownCheckbox.checked = localStorage.getItem("format") === "true";
          textarea.value = localStorage.getItem("content") ?? "";
        } else {
          saveTextCheckbox.disabled = true;
        }

        if (saveTextCheckbox.checked || localStorage.getItem("save") === null) {
          saveTextCheckbox.checked = true;
          saveContent();
          textarea.addEventListener("input", saveContent);
        }
        if (markdownCheckbox.checked) {
          activateFormatting();
        }

        markdownCheckbox.addEventListener("change", updateMarkdownHandling);
        saveTextCheckbox.addEventListener("change", updateSaveText);
      })();

      function activateFormatting() {
        tinyMDE = new TinyMDE.Editor({ textarea });
        tinyMDE.e.id = "tinymde-editor";

        if (saveTextCheckbox.checked) {
          textarea.removeEventListener("input", saveContent);
          tinyMDE.addEventListener("change", saveContent);
        }
      }

      function deactivateFormatting() {
        tinyMDE.e.remove();
        textarea.setAttribute("style", "display: 'inherit'");

        if (saveTextCheckbox.checked) {
          textarea.addEventListener("input", saveContent);
        }
      }

      function updateMarkdownHandling(event) {
        const isMarkdownCheckboxChecked = this.checked;
        localStorage.setItem("format", isMarkdownCheckboxChecked);

        if (isMarkdownCheckboxChecked) {
          if (typeof TinyMDE === "undefined") {
            alert("Text cannot be formatted because the plug-in didn't load!");

            this.checked = false;
            return;
          }
          activateFormatting();
        } else {
          deactivateFormatting();
        }
      }

      function updateSaveText(event) {
        localStorage.setItem("save", String(this.checked));
        if (this.checked) {
          saveContent();
          textarea.addEventListener("input", saveContent);
        } else {
          localStorage.removeItem("content");
          textarea.removeEventListener("input", saveContent);
        }
      }

      function saveContent() {
        localStorage.setItem("content", textarea.value);
      }
    </script>
  </body>
</html>
