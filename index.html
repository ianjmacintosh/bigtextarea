<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Text Area</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 5px;
        font-family: monospace;

        min-height: 100dvh;
        min-width: 100dvw;
        display: grid;
        grid-auto-flow: row;
        grid-template-rows: 1fr auto;
        gap: 10px;
      }

      form[role="main"] {
        align-items: center;
        display: grid;
        grid-template-areas:
          "label controls"
          "textarea textarea";
        grid-template-columns: 1fr auto;
        grid-template-rows: auto 1fr;
        gap: 5px;
      }

      form[role="main"] label {
        grid-area: label;
      }

      form[role="main"] button {
        grid-area: controls;
      }

      .textarea {
        grid-area: textarea;
        height: 100%;
        width: 100%;
        border: solid 1px black;
        font-family: monospace;
        font-size: 16px;
        padding: 5px;
      }

      .textarea:focus {
        outline: solid 2px dodgerblue;
        outline-offset: 1px;
      }

      button {
        display: flex;
        flex-direction: row;
        font-family: monospace;
        align-items: center;
        gap: 5px;
        background-color: oklch(0.97 0 0);
        border: none;
        padding: 5px 20px;
        border-radius: 20px;
        border: solid 1px oklch(0.8 0 0);
        transition: background-color 120ms linear;
      }

      button:hover {
        background-color: oklch(0.95 0.02 200);
      }

      button svg {
        fill: #000;
      }

      #settings {
        text-align: left;
      }

      @keyframes bubble-in {
        0% {
          transform: scale(90%);
        }

        100% {
          transform: scale(100%);
        }
      }

      @keyframes fade-in {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .modal-visible {
        filter: blur(4px);
      }

      #settings {
        border: none;
        animation:
          fade-in 180ms ease-out,
          bubble-in 180ms ease-out;
      }

      #settings::backdrop {
        background-color: rgba(20, 20, 20, 0.2);
        animation: fade-in 180ms;
      }

      #settings ul {
        list-style: none;
        padding-left: 0;
      }

      #settings input {
        min-height: 24px;
        min-width: 24px;
      }

      #settings label {
        gap: 5px;
        display: flex;
        flex-direction: row;
        align-items: center;
      }

      #settings input:focus,
      #settings label:hover input[type="checkbox"] {
        outline: solid 2px dodgerblue;
        outline-offset: 1px;
      }

      .hidden,
      #settings.hidden {
        display: none;
      }

      footer {
        display: grid;
        grid-auto-columns: auto 1fr;
        grid-auto-flow: column;
      }

      #credits {
        text-align: right;
      }

      #settings header {
        display: grid;
        grid-auto-flow: column;
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      #settings header h1 {
        padding: 0;
        margin: 0;
      }

      #settings header button {
        border: none;
        background: transparent;
      }

      #settings header button:hover {
        background: lightgoldenrodyellow;
      }
    </style>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://unpkg.com/tiny-markdown-editor/dist/tiny-mde.min.css"
    />
  </head>
  <body>
    <form action="/" id="form" role="main">
      <label for="textarea">Enter text below</label>
      <textarea
        id="textarea"
        name="textarea"
        class="textarea"
        cols="80"
        rows="10"
        role="main"
        aria-label="Content"
        autofocus
      ></textarea>
      <button type="button" id="settings-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="#000000"
          viewBox="0 0 256 256"
        >
          <path
            d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Zm109.94-52.79a8,8,0,0,0-3.89-5.4l-29.83-17-.12-33.62a8,8,0,0,0-2.83-6.08,111.91,111.91,0,0,0-36.72-20.67,8,8,0,0,0-6.46.59L128,41.85,97.88,25a8,8,0,0,0-6.47-.6A112.1,112.1,0,0,0,54.73,45.15a8,8,0,0,0-2.83,6.07l-.15,33.65-29.83,17a8,8,0,0,0-3.89,5.4,106.47,106.47,0,0,0,0,41.56,8,8,0,0,0,3.89,5.4l29.83,17,.12,33.62a8,8,0,0,0,2.83,6.08,111.91,111.91,0,0,0,36.72,20.67,8,8,0,0,0,6.46-.59L128,214.15,158.12,231a7.91,7.91,0,0,0,3.9,1,8.09,8.09,0,0,0,2.57-.42,112.1,112.1,0,0,0,36.68-20.73,8,8,0,0,0,2.83-6.07l.15-33.65,29.83-17a8,8,0,0,0,3.89-5.4A106.47,106.47,0,0,0,237.94,107.21Zm-15,34.91-28.57,16.25a8,8,0,0,0-3,3c-.58,1-1.19,2.06-1.81,3.06a7.94,7.94,0,0,0-1.22,4.21l-.15,32.25a95.89,95.89,0,0,1-25.37,14.3L134,199.13a8,8,0,0,0-3.91-1h-.19c-1.21,0-2.43,0-3.64,0a8.08,8.08,0,0,0-4.1,1l-28.84,16.1A96,96,0,0,1,67.88,201l-.11-32.2a8,8,0,0,0-1.22-4.22c-.62-1-1.23-2-1.8-3.06a8.09,8.09,0,0,0-3-3.06l-28.6-16.29a90.49,90.49,0,0,1,0-28.26L61.67,97.63a8,8,0,0,0,3-3c.58-1,1.19-2.06,1.81-3.06a7.94,7.94,0,0,0,1.22-4.21l.15-32.25a95.89,95.89,0,0,1,25.37-14.3L122,56.87a8,8,0,0,0,4.1,1c1.21,0,2.43,0,3.64,0a8.08,8.08,0,0,0,4.1-1l28.84-16.1A96,96,0,0,1,188.12,55l.11,32.2a8,8,0,0,0,1.22,4.22c.62,1,1.23,2,1.8,3.06a8.09,8.09,0,0,0,3,3.06l28.6,16.29A90.49,90.49,0,0,1,222.9,142.12Z"
          ></path>
        </svg>
        <span>Settings</span>
      </button>
    </form>
    <dialog aria-labelledby="settings-heading" closedby="any" id="settings">
      <form method="dialog">
        <header>
          <h1 id="settings-heading">Settings</h1>
          <button aria-label='Close "Settings"'>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#000000"
              viewBox="0 0 256 256"
            >
              <path
                d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"
              ></path>
            </svg>
          </button>
        </header>
        <ul>
          <li>
            <label id="format-content-label" for="format-content">
              <input id="format-content" type="checkbox" />
              <span>
                Format content using Markdown (<a
                  href="https://www.markdownguide.org/cheat-sheet/"
                  target="_blank"
                  >cheat sheet</a
                >)</span
              >
            </label>
          </li>
          <li>
            <label id="save-content-label" for="save-content">
              <input id="save-content" type="checkbox" />
              <span>Keep text on reload</span>
            </label>
          </li>
        </ul>
      </form>
      <footer>
        <span id="credits"
          >&copy; 2026
          <a href="https://www.ianjmacintosh.com/" target="_blank"
            >Ian J. MacIntosh</a
          ></span
        >
      </footer>
    </dialog>
    <script src="https://unpkg.com/tiny-markdown-editor/dist/tiny-mde.min.js"></script>

    <script>
      const elements = {
        settings: document.getElementById("settings"),
        textarea: document.getElementById("textarea"),
        settingsButton: document.getElementById("settings-button"),
        markdownCheckbox: document.getElementById("format-content"),
        saveTextCheckbox: document.getElementById("save-content"),
        tinyMDE: null,
      };

      (function initializeApp() {
        if (localStorage) {
          elements.checked = localStorage.getItem("save") === "true";
          elements.markdownCheckbox.checked =
            localStorage.getItem("format") === "true";
          elements.textarea.value = localStorage.getItem("content") ?? "";
        } else {
          elements.saveTextCheckbox.disabled = true;
        }

        if (
          elements.saveTextCheckbox.checked ||
          localStorage.getItem("save") === null ||
          localStorage.getItem("save") === "true"
        ) {
          elements.saveTextCheckbox.checked = true;
          saveContent();
          elements.textarea.addEventListener("input", saveContent);
        }

        if (elements.markdownCheckbox.checked) {
          activateFormatting();
        }

        // Open/close Settings window
        elements.settingsButton.addEventListener("click", toggleSettings);

        // Individual settings
        elements.markdownCheckbox.addEventListener(
          "change",
          updateMarkdownHandling,
        );
        elements.saveTextCheckbox.addEventListener("change", updateSaveText);
      })();

      function toggleSettings() {
        document.body.classList.add("modal-visible");
        elements.settings.addEventListener(
          "close",
          function removeModalVisibleClass() {
            document.body.classList.remove("modal-visible");
          },
        );
        elements.settings.showModal();
      }

      function activateFormatting() {
        tinyMDE = new TinyMDE.Editor({ textarea });
        tinyMDE.e.classList.add("textarea");

        if (elements.saveTextCheckbox.checked) {
          textarea.removeEventListener("input", saveContent);
          tinyMDE.addEventListener("change", saveContent);
        }
      }

      function deactivateFormatting() {
        tinyMDE.e.remove();
        elements.textarea.setAttribute("style", "display: inherit");

        if (elements.saveTextCheckbox.checked) {
          textarea.addEventListener("input", saveContent);
        }
      }

      function updateMarkdownHandling(event) {
        const isMarkdownCheckboxChecked = this.checked;
        localStorage.setItem("format", isMarkdownCheckboxChecked);

        if (isMarkdownCheckboxChecked) {
          if (typeof TinyMDE === "undefined") {
            alert("Text cannot be formatted because the plug-in didn't load!");

            this.checked = false;
            return;
          }
          activateFormatting();
        } else {
          deactivateFormatting();
        }
      }

      function updateSaveText(event) {
        localStorage.setItem("save", String(this.checked));
        if (this.checked) {
          saveContent();
          textarea.addEventListener("input", saveContent);
        } else {
          localStorage.removeItem("content");
          textarea.removeEventListener("input", saveContent);
        }
      }

      function saveContent() {
        localStorage.setItem("content", textarea.value);
      }
    </script>
  </body>
</html>
